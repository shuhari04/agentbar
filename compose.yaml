services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentbar
      POSTGRES_USER: agentbar
      POSTGRES_PASSWORD: agentbar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbar -d agentbar"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - agentbar-postgres:/var/lib/postgresql/data
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      AGENTBAR_DATABASE_URL: postgresql://agentbar:agentbar@db:5432/agentbar
      AGENTBAR_TOKEN_SECRET: local-development-token-secret-change-me
      AGENTBAR_SESSION_SECRET: local-development-session-secret-change-me
      AGENTBAR_PUBLIC_ORIGIN: http://localhost:3000
      AGENTBAR_AUTH_PROVIDER: guest
      AGENTBAR_DATA_DIR: /app/.data
    ports:
      - "3000:3000"
    command: ["sh", "-c", "node scripts/migrate.js && node server/agentbar-api.js"]
    volumes:
      - agentbar-data:/app/.data
volumes:
  agentbar-postgres:
  agentbar-data:
